name: Send WhatsApp Report Now

on:
  push:
    branches:
      - claude/check-latest-updates-xWWmJ
    paths:
      - '.github/workflows/send_whatsapp_now.yml'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (latest pipeline outputs)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Overlay scripts from feature branch
        run: |
          git fetch origin claude/check-latest-updates-xWWmJ
          git checkout origin/claude/check-latest-updates-xWWmJ -- \
            scripts/generate_nse_report.py \
            scripts/send_whatsapp_report.py \
            scripts/send_email_report.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas twilio

      - name: Generate NSE report
        run: python scripts/generate_nse_report.py

      - name: Send WhatsApp report (run 6)
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          TWILIO_TO: ${{ secrets.TWILIO_TO }}
        run: python scripts/send_whatsapp_report.py

      - name: Email report
        env:
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python scripts/send_email_report.py
